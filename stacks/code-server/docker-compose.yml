# =============================================================================
# code-server - VS Code in the Browser
# =============================================================================
# Access via: https://code.${domain}
# Run VS Code on a remote server and access it through the browser for
# consistent development environments accessible from any device.
#
# Note: Password authentication is disabled (--auth none) since Cloudflare
# Access provides email OTP protection at the network level.
#
# Git Integration: If Gitea is enabled, the shared workspace repo is
# auto-cloned and code-server opens directly in that folder.
# =============================================================================

services:
  code-server:
    build: .
    image: ${IMAGE_CODE_SERVER:-nexus-code-server:latest}
    container_name: code-server
    restart: unless-stopped
    entrypoint: >
      bash -c "
        if ! grep -q 'Auto-activate Nexus-Stack' /home/coder/.bashrc 2>/dev/null; then
          printf '\\n# Auto-activate Nexus-Stack pre-installed dbt + notebook venv\\nif [ -f /opt/nexus-venv/bin/activate ]; then\\n  . /opt/nexus-venv/bin/activate\\nfi\\n' >> /home/coder/.bashrc;
          echo '[code-server] Appended nexus-venv auto-activate block to ~/.bashrc';
        fi;
        if [ -n \"$$GITEA_USERNAME\" ] && [ -n \"$$GITEA_PASSWORD\" ]; then
          echo \"machine gitea login $$GITEA_USERNAME password $$GITEA_PASSWORD\" > /home/coder/.netrc;
          chmod 600 /home/coder/.netrc;
        fi;
        if [ -n \"$$GITEA_REPO_URL\" ] && [ ! -d /home/coder/$$REPO_NAME/.git ]; then
          if git clone \"$$GITEA_REPO_URL\" /home/coder/$$REPO_NAME; then
            echo '[code-server] Cloned Git repo into /home/coder/'$$REPO_NAME;
          else
            echo '[code-server] Warning: Failed to clone '$$GITEA_REPO_URL >&2;
          fi;
        fi;
        USER_EXT_DIR=/home/coder/.local/share/code-server/extensions;
        mkdir -p \"$$USER_EXT_DIR\";
        if [ -z \"$$(ls -A \"$$USER_EXT_DIR\" 2>/dev/null)\" ]; then
          cp -a /opt/code-server-extensions/. \"$$USER_EXT_DIR/\";
          echo '[code-server] Seeded baked extensions into user dir (first-start or empty volume)';
        fi;
        if [ \"$$NEXUS_POSTGRES_ENABLED\" = \"1\" ] && [ -n \"$$POSTGRES_PASSWORD\" ]; then
          mkdir -p /home/coder/.local/share/code-server/User;
          python3 /opt/code-server-scripts/write-sqltools-settings.py && echo '[code-server] Wrote SQLTools Nexus Postgres connection (NEXUS_POSTGRES_ENABLED=1)';
        else
          echo '[code-server] Skipping SQLTools auto-connect (NEXUS_POSTGRES_ENABLED unset or POSTGRES_PASSWORD empty)';
        fi;
        OPEN_DIR=/home/coder;
        if [ -d /home/coder/$$REPO_NAME ]; then OPEN_DIR=/home/coder/$$REPO_NAME; fi;
        exec code-server --auth none --bind-addr 0.0.0.0:8080 $$OPEN_DIR
      "
    env_file:
      - path: .env
        required: false
      # Infisical secrets land in a dedicated file (written by the
      # orchestrator's secret-sync-code-server phase), not in `.env`.
      # Same rationale as the Jupyter stack: keep `${VAR}` interpolation
      # in this compose file isolated from secret values, and keep
      # the config-hash that compose uses for restart-on-change
      # detection scoped to actually-secret-relevant content.
      - path: .infisical.env
        required: false
    ports:
      - "8100:8080"
    deploy:
      resources:
        limits:
          # Bumped from 512m: with SQLTools + Postgres-driver +
          # extension-host + workspace-indexer all running as Node
          # subprocesses, 512m hit OOM in practice — symptoms were
          # silent extension-host crashes (white webview panels for
          # SQLTools-Settings) and the file-tree disappearing
          # mid-session. Verified on a live container that the new
          # baseline sits around 350-500 MiB with extensions active.
          memory: 2g
    volumes:
      - code-server-data:/home/coder
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  code-server-data:

networks:
  app-network:
    external: true
